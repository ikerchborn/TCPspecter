<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCPspecter - Logs de Seguridad Avanzada</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #4a7a9d;
            --accent: #f2e8c9;
            --danger: #f87171;
            --warning: #fbbf24;
            --success: #34d399;
            --shadow: rgba(0, 0, 0, 0.4);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(74, 122, 157, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(242, 232, 201, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }
        .logo-section h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
        }
        .logo-section h1 span {
            color: var(--danger);
        }
        .logo-section p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .nav-btn {
            background: rgba(74, 122, 157, 0.15);
            border: 1px solid var(--primary);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: rgba(74, 122, 157, 0.3);
        }
        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px var(--shadow);
        }
        .filter-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 13px;
            flex-grow: 1;
            min-width: 200px;
        }
        .search-bar:focus {
            outline: none;
            border-color: var(--primary);
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: var(--text-muted);
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        .log-table th {
            text-align: left;
            padding: 12px;
            color: var(--text-muted);
            border-bottom: 2px solid var(--card-border);
            font-weight: 600;
        }
        .log-table td {
            padding: 12px;
            border-bottom: 1px solid var(--card-border);
        }
        .log-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-detected {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .badge-resolved {
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }
        .sev-critico {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }
        .sev-alto {
            background: rgba(251, 191, 36, 0.15);
            color: var(--warning);
        }
        .sev-medio {
            background: rgba(74, 122, 157, 0.15);
            color: var(--primary);
        }
        .sev-bajo {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }
        .timestamp {
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            margin: 5% auto;
            padding: 24px;
            width: 80%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        .close-btn {
            color: var(--text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        .close-btn:hover {
            color: #fff;
        }
        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }
        .modal-header h3 {
            font-size: 20px;
            color: var(--text-main);
        }
        .info-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .info-block h4 {
            color: var(--primary);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .info-block p, .info-block pre {
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .block-danger {
            border-left: 3px solid var(--danger);
            background: rgba(248, 113, 113, 0.05);
        }
        .block-danger h4 {
            color: var(--danger);
        }
        
        tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }
        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <h1 data-i18n="logs_title">TCPspecter - <span>Seguridad Historial</span></h1>
            <p data-i18n="logs_subtitle">Logs y Auditoría de Amenazas Avanzadas en Tiempo Real</p>
        </div>
        <div style="display:flex; gap:16px; align-items:center;">
            <div class="lang-selector" style="display:flex; gap:6px; margin-right:8px;">
                <button class="lang-btn" data-lang="es" onclick="changeLanguage('es')" style="background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); color: var(--text-muted); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer;">ES</button>
                <button class="lang-btn" data-lang="en" onclick="changeLanguage('en')" style="background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); color: var(--text-muted); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer;">EN</button>
            </div>
            <a href="/" class="nav-btn" data-i18n="nav_dashboard">📊 Volver al Dashboard</a>
        </div>
    </header>
    <div class="container">
        <div class="filter-row">
            <input type="text" id="search_log" class="search-bar" placeholder="Buscar por proceso, PID, descripción..." oninput="filterLogs()">
            <button class="filter-btn active" id="btn_filter_all" onclick="setFilter('status', 'ALL', this)" data-i18n="filter_all">Todos</button>
            <button class="filter-btn" id="btn_filter_det" onclick="setFilter('status', 'DETECTED', this)" data-i18n="filter_det">⚠️ Detectados</button>
            <button class="filter-btn" id="btn_filter_res" onclick="setFilter('status', 'RESOLVED', this)" data-i18n="filter_res">✅ Resueltos</button>
            <button class="filter-btn" id="btn_filter_crit" onclick="setFilter('severity', 'CRITICAL', this)" data-i18n="filter_crit">🔴 Crítico</button>
            <button class="filter-btn" id="btn_filter_high" onclick="setFilter('severity', 'HIGH', this)" data-i18n="filter_high">🟡 Alto</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="log-table">
                <thead>
                    <tr>
                        <th data-i18n="col_date">Fecha/Hora</th>
                        <th data-i18n="col_status">Estado</th>
                        <th data-i18n="col_sev">Severidad</th>
                        <th data-i18n="col_cat">Categoría</th>
                        <th>PID</th>
                        <th data-i18n="col_proc">Proceso</th>
                        <th data-i18n="col_desc">Descripción</th>
                    </tr>
                </thead>
                <tbody id="logs_tbody">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>
        <div id="pagination_controls" style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
            <button id="btn_prev_page" onclick="changePage(-1)" style="background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer;" disabled>Anterior</button>
            <span id="page_info" style="color: var(--text-muted); font-size: 13px;">Página 1</span>
            <button id="btn_next_page" onclick="changePage(1)" style="background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer;">Siguiente</button>
        </div>
    </div>

    <!-- Modal for Detailed Log Info -->
    <div class="modal" id="log_modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h3 id="modal_cat" data-i18n="modal_title">Detalle de Evento</h3>
                <p style="font-size: 13px; color: var(--text-muted); margin-top: 4px;" id="modal_meta">-</p>
            </div>
            <div class="modal-body">
                <div class="info-block block-danger" id="modal_danger_block">
                    <h4 data-i18n="modal_desc">Descripción del Riesgo</h4>
                    <p id="modal_desc_val">-</p>
                </div>
                <div class="info-block" id="modal_proc_block">
                    <h4 data-i18n="modal_proc_details">Detalles del Proceso</h4>
                    <p id="modal_proc_val">-</p>
                </div>
                <div class="info-block" id="modal_raw_block">
                    <h4 data-i18n="modal_raw_data">Datos Raw / Trazabilidad</h4>
                    <pre style="font-family: monospace; font-size: 12px; color: var(--text-muted);" id="modal_raw_val">-</pre>
                </div>
            </div>
        </div>
    </div>
    <script>
        let allLogs = [];
        let statusFilter = 'ALL';
        let severityFilter = 'ALL';
        let currentPage = 1;
        const ITEMS_PER_PAGE = 100;

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                allLogs = await res.json();
                renderLogs();
            } catch (err) {
                console.error("Error al cargar logs:", err);
            }
        }

        function setFilter(type, val, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (type === 'status') {
                statusFilter = val;
                severityFilter = 'ALL';
            } else if (type === 'severity') {
                severityFilter = val;
                statusFilter = 'ALL';
            }
            currentPage = 1; // Reset to page 1 on filter
            renderLogs();
        }

        function filterLogs() {
            currentPage = 1; // Reset to page 1 on search
            renderLogs();
        }

        function changePage(delta) {
            currentPage += delta;
            renderLogs();
        }

        function renderLogs() {
            const tbody = document.getElementById('logs_tbody');
            const searchVal = document.getElementById('search_log').value.toLowerCase().trim();
            
            const filtered = allLogs.filter(log => {
                // Status Filter
                if (statusFilter !== 'ALL' && log.status !== statusFilter) return false;
                // Severity Filter
                if (severityFilter !== 'ALL' && log.severity !== severityFilter) return false;
                // Search query
                if (searchVal) {
                    return (
                        (log.proc_name || '').toLowerCase().includes(searchVal) ||
                        String(log.pid || '').includes(searchVal) ||
                        (log.description || '').toLowerCase().includes(searchVal) ||
                        (log.category || '').toLowerCase().includes(searchVal)
                    );
                }
                return true;
            });

            if (filtered.length === 0) {
                const lang = localStorage.getItem('language') || 'en';
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px 0;">${translations[lang]['no_logs']}</td></tr>`;
                document.getElementById('pagination_controls').style.display = 'none';
                return;
            }

            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            
            document.getElementById('pagination_controls').style.display = 'flex';
            document.getElementById('page_info').innerText = `Página ${currentPage} de ${totalPages}`;
            document.getElementById('btn_prev_page').disabled = (currentPage === 1);
            document.getElementById('btn_next_page').disabled = (currentPage === totalPages);

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const paginated = filtered.slice(startIndex, endIndex);

            window.currentFilteredLogs = filtered;

            tbody.innerHTML = paginated.map((log, index) => {
                const globalIndex = startIndex + index;
                const lang = localStorage.getItem('language') || 'en';
                const statusBadge = log.status === 'DETECTED' ? 'badge-detected' : 'badge-resolved';
                const statusLabel = log.status === 'DETECTED' 
                    ? (lang === 'es' ? '⚠️ DETECTADO' : '⚠️ DETECTED') 
                    : (lang === 'es' ? '✅ RESUELTO' : '✅ RESOLVED');
                
                let sevClass = 'sev-bajo';
                if (log.severity === 'CRITICAL') sevClass = 'sev-critico';
                else if (log.severity === 'HIGH') sevClass = 'sev-alto';
                else if (log.severity === 'MEDIUM') sevClass = 'sev-medio';

                return `
                    <tr onclick="showLogDetails(${globalIndex})">
                        <td class="timestamp">${log.timestamp}</td>
                        <td><span class="badge ${statusBadge}">${statusLabel}</span></td>
                        <td><span class="badge ${sevClass}">${log.severity}</span></td>
                        <td><strong>${log.category}</strong></td>
                        <td>${log.pid || '-'}</td>
                        <td><code>${log.proc_name || '-'}</code></td>
                        <td>${log.description}</td>
                    </tr>
                `;
            }).join('');
        }

        function showLogDetails(index) {
            if (!window.currentFilteredLogs || !window.currentFilteredLogs[index]) return;
            const log = window.currentFilteredLogs[index];
            
            document.getElementById('modal_cat').innerText = log.category;
            document.getElementById('modal_meta').innerText = `${log.timestamp} | ${log.severity} | ${log.status}`;
            document.getElementById('modal_desc_val').innerText = log.description;
            
            const procDetails = [];
            if (log.pid) procDetails.push(`PID: ${log.pid}`);
            if (log.proc_name) procDetails.push(`Process: ${log.proc_name}`);
            if (log.exe_path) procDetails.push(`Executable: ${log.exe_path}`);
            if (log.cmdline) procDetails.push(`Command: ${log.cmdline}`);
            document.getElementById('modal_proc_val').innerText = procDetails.length > 0 ? procDetails.join('\\n') : 'N/A';
            
            document.getElementById('modal_raw_val').innerText = JSON.stringify(log, null, 2);
            
            document.getElementById('log_modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('log_modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('log_modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        const translations = {
            es: {
                logs_title: "TCPspecter - <span>Seguridad Historial</span>",
                logs_subtitle: "Logs y Auditoría de Amenazas Avanzadas en Tiempo Real",
                nav_dashboard: "📊 Volver al Dashboard",
                filter_all: "Todos",
                filter_det: "⚠️ Detectados",
                filter_res: "✅ Resueltos",
                filter_crit: "🔴 Crítico",
                filter_high: "🟡 Alto",
                col_date: "Fecha/Hora",
                col_status: "Estado",
                col_sev: "Severidad",
                col_cat: "Categoría",
                col_proc: "Proceso",
                col_desc: "Descripción",
                no_logs: "No se encontraron registros en la bitácora."
            },
            en: {
                logs_title: "TCPspecter - <span>Security History</span>",
                logs_subtitle: "Logs & Audit of Advanced Threats in Real-Time",
                nav_dashboard: "📊 Back to Dashboard",
                filter_all: "All",
                filter_det: "⚠️ Detected",
                filter_res: "✅ Resolved",
                filter_crit: "🔴 Critical",
                filter_high: "🟡 High",
                col_date: "Date/Time",
                col_status: "Status",
                col_sev: "Severity",
                col_cat: "Category",
                col_proc: "Process",
                col_desc: "Description",
                no_logs: "No logs found in the audit trail."
            }
        };

        function changeLanguage(lang) {
            localStorage.setItem('language', lang);
            applyLanguage();
            renderLogs();
        }

        function applyLanguage() {
            const lang = localStorage.getItem('language') || 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
            const searchBar = document.getElementById('search_log');
            if (searchBar) {
                searchBar.placeholder = lang === 'es' ? "Buscar por proceso, PID, descripción..." : "Search by process, PID, description...";
            }
            // Style active language button
            document.querySelectorAll('.lang-btn').forEach(b => {
                const isCurrent = b.getAttribute('data-lang') === lang;
                b.style.background = isCurrent ? 'rgba(74, 122, 157, 0.3)' : 'rgba(255,255,255,0.03)';
                b.style.borderColor = isCurrent ? 'var(--primary)' : 'var(--card-border)';
                b.style.color = isCurrent ? 'var(--text-main)' : 'var(--text-muted)';
            });
        }

        window.onload = () => {
            fetchLogs();
            applyLanguage();
            setInterval(fetchLogs, 3000);
        };
    </script>
</body>
</html>
